<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Heap Sort — Sorting Visualized</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <main class="page-main algorithm-page">
    <a href="index.html" class="back-link">← back to home</a>
    <h1 class="page-title">heap sort</h1>
    <p class="page-desc">Build a max-heap, then extract the max one by one to the end. O(n log n), in-place.</p>

    <div class="viz-panel">
      <div class="viz-canvas" id="canvas"></div>
      <div class="controls">
        <button type="button" class="btn btn-primary" id="btnPlay">▶ Play</button>
        <button type="button" class="btn" id="btnShuffle">🔀 Shuffle</button>
        <div class="slider-wrap">
          <label>Speed</label>
          <input type="range" id="speed" min="1" max="100" value="50">
        </div>
        <div class="slider-wrap">
          <label>Size</label>
          <input type="range" id="size" min="10" max="80" value="40">
        </div>
        <span class="slider-wrap" id="stats">Compares: 0 · Swaps: 0</span>
      </div>
    </div>

    <div class="info-box">
      <strong>Complexity:</strong>
      <ul>
        <li>Time: O(n log n) always</li>
        <li>Space: O(1)</li>
        <li>Stable: no</li>
      </ul>
    </div>
  </main>

  <script>
    const canvas = document.getElementById('canvas');
    const btnPlay = document.getElementById('btnPlay');
    const btnShuffle = document.getElementById('btnShuffle');
    const speedInput = document.getElementById('speed');
    const sizeInput = document.getElementById('size');
    const statsEl = document.getElementById('stats');

    let arr = [];
    let comparing = new Set();
    let sorted = new Set();
    let heapEnd = -1;
    let compareCount = 0;
    let swapCount = 0;
    let animationId = null;
    let isRunning = false;

    function randomArray(n) {
      const a = [];
      for (let i = 0; i < n; i++) a.push(Math.floor(Math.random() * 100) + 5);
      return a;
    }

    function render() {
      const max = Math.max(...arr);
      canvas.innerHTML = '';
      arr.forEach((val, i) => {
        const bar = document.createElement('div');
        bar.className = 'bar';
        if (sorted.has(i)) bar.classList.add('sorted');
        else if (comparing.has(i)) bar.classList.add('compare');
        bar.style.height = `${(val / max) * 100}%`;
        bar.title = `${val} (index ${i})`;
        canvas.appendChild(bar);
      });
    }

    function updateStats() {
      statsEl.textContent = `Compares: ${compareCount} · Swaps: ${swapCount}`;
    }

    function shuffle() {
      if (isRunning) return;
      const n = parseInt(sizeInput.value, 10);
      arr = randomArray(n);
      comparing.clear();
      sorted.clear();
      heapEnd = -1;
      compareCount = 0;
      swapCount = 0;
      updateStats();
      render();
    }

    function* heapify(n, i) {
      let largest = i;
      const left = 2 * i + 1;
      const right = 2 * i + 2;
      if (left < n) {
        comparing.clear();
        comparing.add(largest);
        comparing.add(left);
        compareCount++;
        updateStats();
        render();
        yield;
        if (arr[left] > arr[largest]) largest = left;
      }
      if (right < n) {
        comparing.clear();
        comparing.add(largest);
        comparing.add(right);
        compareCount++;
        updateStats();
        render();
        yield;
        if (arr[right] > arr[largest]) largest = right;
      }
      if (largest !== i) {
        [arr[i], arr[largest]] = [arr[largest], arr[i]];
        swapCount++;
        updateStats();
        render();
        yield;
        yield* heapify(n, largest);
      }
    }

    function* heapSort() {
      const n = arr.length;
      for (let i = Math.floor(n / 2) - 1; i >= 0; i--) {
        yield* heapify(n, i);
      }
      for (let end = n - 1; end > 0; end--) {
        [arr[0], arr[end]] = [arr[end], arr[0]];
        swapCount++;
        sorted.add(end);
        updateStats();
        render();
        yield;
        yield* heapify(end, 0);
      }
      sorted.add(0);
      comparing.clear();
      render();
    }

    function run() {
      if (isRunning) return;
      isRunning = true;
      btnPlay.textContent = '⏸ Pause';
      btnPlay.onclick = pause;
      const gen = heapSort();
      const delay = () => 200 - (speedInput.value * 1.8);

      function step() {
        const { done } = gen.next();
        if (done) {
          isRunning = false;
          btnPlay.textContent = '▶ Play';
          btnPlay.onclick = run;
          return;
        }
        animationId = setTimeout(step, delay());
      }
      step();
    }

    function pause() {
      if (animationId) clearTimeout(animationId);
      animationId = null;
      isRunning = false;
      btnPlay.textContent = '▶ Play';
      btnPlay.onclick = run;
    }

    btnPlay.onclick = run;
    btnShuffle.onclick = shuffle;
    sizeInput.addEventListener('input', () => { if (!isRunning) shuffle(); });

    shuffle();
  </script>
</body>
</html>
