<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Merge Sort — Sorting Visualized</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <main class="page-main algorithm-page">
    <a href="index.html" class="back-link">← back to home</a>
    <h1 class="page-title">merge sort</h1>
    <p class="page-desc">Split the array in half, recursively sort each half, then merge the two sorted parts.</p>

    <div class="viz-panel">
      <div class="viz-canvas" id="canvas"></div>
      <div class="controls">
        <button type="button" class="btn btn-primary" id="btnPlay">▶ Play</button>
        <button type="button" class="btn" id="btnShuffle">🔀 Shuffle</button>
        <div class="slider-wrap">
          <label>Speed</label>
          <input type="range" id="speed" min="1" max="100" value="50">
        </div>
        <div class="slider-wrap">
          <label>Size</label>
          <input type="range" id="size" min="10" max="80" value="40">
        </div>
        <span class="slider-wrap" id="stats">Compares: 0 · Writes: 0</span>
      </div>
    </div>

    <div class="info-box">
      <strong>Complexity:</strong>
      <ul>
        <li>Time: O(n log n) always</li>
        <li>Space: O(n) for temporary arrays</li>
        <li>Stable: yes</li>
      </ul>
    </div>
  </main>

  <script>
    const canvas = document.getElementById('canvas');
    const btnPlay = document.getElementById('btnPlay');
    const btnShuffle = document.getElementById('btnShuffle');
    const speedInput = document.getElementById('speed');
    const sizeInput = document.getElementById('size');
    const statsEl = document.getElementById('stats');

    let arr = [];
    let comparing = new Set();
    let sorted = new Set();
    let compareCount = 0;
    let writeCount = 0;
    let animationId = null;
    let isRunning = false;

    function randomArray(n) {
      const a = [];
      for (let i = 0; i < n; i++) a.push(Math.floor(Math.random() * 100) + 5);
      return a;
    }

    function render() {
      const max = Math.max(...arr);
      canvas.innerHTML = '';
      arr.forEach((val, i) => {
        const bar = document.createElement('div');
        bar.className = 'bar';
        if (sorted.has(i)) bar.classList.add('sorted');
        else if (comparing.has(i)) bar.classList.add('compare');
        bar.style.height = `${(val / max) * 100}%`;
        bar.title = `${val} (index ${i})`;
        canvas.appendChild(bar);
      });
    }

    function updateStats() {
      statsEl.textContent = `Compares: ${compareCount} · Writes: ${writeCount}`;
    }

    function shuffle() {
      if (isRunning) return;
      const n = parseInt(sizeInput.value, 10);
      arr = randomArray(n);
      comparing.clear();
      sorted.clear();
      compareCount = 0;
      writeCount = 0;
      updateStats();
      render();
    }

    function* merge(left, mid, right) {
      const leftArr = arr.slice(left, mid + 1);
      const rightArr = arr.slice(mid + 1, right + 1);
      let i = 0, j = 0, k = left;
      while (i < leftArr.length && j < rightArr.length) {
        comparing.clear();
        comparing.add(left + i);
        comparing.add(mid + 1 + j);
        compareCount++;
        updateStats();
        render();
        yield;
        if (leftArr[i] <= rightArr[j]) {
          arr[k] = leftArr[i];
          writeCount++;
          i++;
        } else {
          arr[k] = rightArr[j];
          writeCount++;
          j++;
        }
        k++;
        updateStats();
        render();
        yield;
      }
      while (i < leftArr.length) {
        arr[k] = leftArr[i];
        writeCount++;
        i++;
        k++;
        render();
        yield;
      }
      while (j < rightArr.length) {
        arr[k] = rightArr[j];
        writeCount++;
        j++;
        k++;
        render();
        yield;
      }
      for (let idx = left; idx <= right; idx++) sorted.add(idx);
      comparing.clear();
      render();
      yield;
    }

    function* mergeSortGen(left, right) {
      if (left >= right) {
        sorted.add(left);
        return;
      }
      const mid = Math.floor((left + right) / 2);
      yield* mergeSortGen(left, mid);
      yield* mergeSortGen(mid + 1, right);
      yield* merge(left, mid, right);
    }

    function run() {
      if (isRunning) return;
      sorted.clear();
      isRunning = true;
      btnPlay.textContent = '⏸ Pause';
      btnPlay.onclick = pause;
      const gen = mergeSortGen(0, arr.length - 1);
      const delay = () => 200 - (speedInput.value * 1.8);

      function step() {
        const { done } = gen.next();
        if (done) {
          for (let i = 0; i < arr.length; i++) sorted.add(i);
          comparing.clear();
          render();
          isRunning = false;
          btnPlay.textContent = '▶ Play';
          btnPlay.onclick = run;
          return;
        }
        animationId = setTimeout(step, delay());
      }
      step();
    }

    function pause() {
      if (animationId) clearTimeout(animationId);
      animationId = null;
      isRunning = false;
      btnPlay.textContent = '▶ Play';
      btnPlay.onclick = run;
    }

    btnPlay.onclick = run;
    btnShuffle.onclick = shuffle;
    sizeInput.addEventListener('input', () => { if (!isRunning) shuffle(); });

    shuffle();
  </script>
</body>
</html>
